name: Build Screeny
on: [workflow_dispatch]

env:
  # Silences the Node 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Build and Publish
      shell: pwsh
      run: |
        # 1. Isolate the main .csproj file to bypass the .sln output restriction
        $csproj = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1
        
        # 2. Publish the raw executable, explicitly disabling code-signing and appx packaging
        dotnet publish $csproj.FullName -c Release -r win-x64 --self-contained true -o ./build_output /p:AppxPackageSigningEnabled=false /p:GenerateAppxPackageOnBuild=false

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Screeny-Executable
        path: ./build_output
